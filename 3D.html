<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Déco 3D - V0</title>
    <style>
      html, body { height: 100%; margin: 0; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      #app { height: 100%; }

      /* Wrapper positionné en bas à gauche — contient le tab + le panneau */
      #panel-wrapper {
        position: fixed;
        left: 12px;
        bottom: calc(12px + env(safe-area-inset-bottom));
        width: min(210px, calc(100vw - 24px));
        display: flex;
        flex-direction: column;
      }

      #panel {
        width: 100%;
        max-height: min(72vh, 620px);
        overflow: auto;
        padding: 12px;
        padding-bottom: calc(12px + env(safe-area-inset-bottom));
        border-radius: 0 14px 14px 14px;
        background: rgba(16, 18, 22, 0.72);
        color: #fff;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.08);
        border-top: none;
        transition: max-height 220ms ease, opacity 220ms ease, padding 220ms ease;
        transform-origin: bottom left;
      }
      #panel h2 { margin: 0 0 8px 0; font-size: 14px; opacity: 0.9; }

      details {
        border-radius: 12px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.06);
        margin-bottom: 10px;
      }
      summary {
        cursor: pointer;
        padding: 10px 12px;
        font-weight: 650;
        font-size: 14px;
        list-style: none;
      }
      summary::-webkit-details-marker { display:none; }

      .group { padding: 10px 12px 12px 12px; }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        margin: 10px 0;
        width: 100%;
      }
      .label { font-size: 13px; opacity: 0.95; }
      .pct { font-variant-numeric: tabular-nums; font-size: 12px; opacity: 0.9; }
      .slider { width: 50%; margin-top: 6px; }
      .hint { font-size: 12px; opacity: 0.8; line-height: 1.35; }


      .btn {
        background: rgba(16, 18, 22, 0.65);
        border: 1px solid rgba(255,255,255,0.10);
        color: #fff;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 13px;
        cursor: pointer;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }

      .panel-reset {
        width: 100%;
        margin-top: 10px;
      }

/* Onglet-interrupteur attaché en haut du panneau */
#uiToggle {
  align-self: flex-start;
  padding: 6px 14px;
  border-radius: 10px 10px 0 0;
  border: 1px solid rgba(255,255,255,0.14);
  border-bottom: none;
  background: rgba(16, 18, 22, 0.72);
  color: rgba(255,255,255,0.88);
  font: 13px system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 150ms ease;
}
#uiToggle:hover { background: rgba(30, 33, 40, 0.85); }
#uiToggle .toggle-arrow {
  font-size: 10px;
  transition: transform 220ms ease;
  display: inline-block;
}

/* Etat caché : panneau replié */
body.ui-collapsed #panel {
  max-height: 0;
  opacity: 0;
  padding-top: 0;
  padding-bottom: 0;
  pointer-events: none;
  overflow: hidden;
  border: none;
}
body.ui-collapsed #uiToggle {
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.14);
}
body.ui-collapsed #uiToggle .toggle-arrow {
  transform: rotate(-90deg);
}

body.embed-ui-hidden #panel-wrapper,
body.embed-ui-hidden #topbar {
  opacity: 0;
  pointer-events: none;
}

/* Ajustements mobile */
@media (max-width: 520px) {
  #panel-wrapper {
    width: min(160px, 65vw);
  }
  #panel { font-size: 12px; }
  #panel input[type="range"] { height: 18px; }
  #panel label { font-size: 12px; }
}



  
    </style>
  </head>
  <body>
<div id="app"></div>

    <div id="panel-wrapper">
      <button id="uiToggle" aria-expanded="true" aria-controls="panel">
        Textures <span class="toggle-arrow">▼</span>
      </button>
      <div id="panel">
      <h2>Textures</h2>

      <details>
        <summary>Murs</summary>
        <div class="group" id="group-walls"></div>
      </details>

      <details>
        <summary>Sols</summary>
        <div class="group" id="group-floors"></div>
      </details>

      <details>
        <summary>Couverture</summary>
        <div class="group" id="group-couverture"></div>
      </details>

      <details>
        <summary>Linteaux</summary>
        <div class="group" id="group-linteau"></div>
      </details>

      <details>
        <summary>Menuiseries</summary>
        <div class="group" id="group-menuiserie"></div>
      </details>

      <!-- (texte d'aide supprimé, plus nécessaire) -->
      <button class="btn panel-reset" id="resetBtn">Réinitialiser</button>
    </div>
    </div>

    <!-- Accordéon : un seul details ouvert à la fois -->
    <script>
      const allDetails = document.querySelectorAll('#panel details');
      allDetails.forEach(detail => {
        detail.addEventListener('toggle', () => {
          if (detail.open) {
            allDetails.forEach(other => {
              if (other !== detail) other.removeAttribute('open');
            });
          }
        });
      });

      // Clic en dehors du panneau → fermer tous les details
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#panel')) {
          allDetails.forEach(d => d.removeAttribute('open'));
        }
      });
    </script>
    <script type="module" src="/src/main.js"></script>
    
  </body>
</html>
